apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeaudit-api
  namespace: kubeaudit-revamp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeaudit-api
  template:
    metadata:
      labels:
        app: kubeaudit-api
    spec:
      containers:
        - name: api
          image: kubeaudit-revamp-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: kubeaudit-revamp-config
            - secretRef:
                name: kubeaudit-revamp-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kubeaudit-api
  namespace: kubeaudit-revamp
spec:
  selector:
    app: kubeaudit-api
  ports:
    - port: 8080
      targetPort: 8080

