apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kubeaudit-revamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: kubeaudit
            - name: POSTGRES_USER
              value: kubeaudit
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubeaudit-revamp-secret
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kubeaudit-revamp
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

